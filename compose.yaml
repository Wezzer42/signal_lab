version: "3.9"

services:
  postgres:
    image: postgres:15.6
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: signallab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrator:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: >-
      sh -c "pnpm --filter api run prisma:migrate:deploy && pnpm --filter api run prisma:seed && pnpm --filter api run prisma:generate"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/signallab
      NODE_ENV: production
      SENTRY_DSN: ${SENTRY_DSN:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/signallab
      NODE_ENV: production
      PORT: 3001
      SENTRY_DSN: ${SENTRY_DSN:-}
      LOG_PATH: /var/log/signal-lab/api.log
    ports:
      - "3001:3001"
    volumes:
      - api_logs:/var/log/signal-lab
    depends_on:
      migrator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.53.1
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_started

  loki:
    image: grafana/loki:3.7.0
    command: ["-config.file=/etc/loki/local-config.yml"]
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.7.0
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./docker/promtail/config.yml:/etc/promtail/config.yml:ro
      - api_logs:/var/log/signal-lab:ro
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3002:3000"
    depends_on:
      - loki
      - prometheus

volumes:
  postgres_data:
  grafana_data:
  loki_data:
  api_logs:
